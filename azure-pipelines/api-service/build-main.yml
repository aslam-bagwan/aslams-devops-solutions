trigger:
  branches:
    include:
      - main
  paths:
    include:
      - api-service/**
      - azure-pipelines/api-service/**

pr: none

pool:
  name: $(agentPoolName)
  demands:
    - docker

variables:
  - group: ci-cd-shared
  - group: api-service-build
  - name: buildConfiguration
    value: Release
  - name: dotnetVersion
    value: 8.0.x
  - name: projectPath
    value: api-service
  - name: dockerfilePath
    value: api-service/Dockerfile
  - name: imageRepository
    value: api-service
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - stage: Build
    displayName: Build and test API
    jobs:
      - job: BuildAndTest
        displayName: Restore, build, test
        steps:
          - checkout: self
            fetchDepth: 0

          - task: PowerShell@2
            name: detectApi
            displayName: Detect API project files
            inputs:
              targetType: inline
              pwsh: true
              script: |
                $projects = Get-ChildItem -Path "$(projectPath)" -Recurse -Filter *.csproj -ErrorAction SilentlyContinue
                if (-not $projects) {
                  Write-Host "##vso[task.logissue type=warning]No .csproj files found under $(projectPath). Skipping .NET steps."
                  Write-Host "##vso[task.setvariable variable=HasDotNetProjects]false"
                } else {
                  Write-Host "##vso[task.setvariable variable=HasDotNetProjects]true"
                }

          - task: UseDotNet@2
            displayName: Use .NET SDK
            condition: eq(variables['HasDotNetProjects'], 'true')
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore
            condition: eq(variables['HasDotNetProjects'], 'true')
            inputs:
              command: restore
              projects: $(projectPath)/**/*.csproj

          - task: DotNetCoreCLI@2
            displayName: Build
            condition: eq(variables['HasDotNetProjects'], 'true')
            inputs:
              command: build
              projects: $(projectPath)/**/*.csproj
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: PowerShell@2
            displayName: Test if test projects exist
            condition: eq(variables['HasDotNetProjects'], 'true')
            inputs:
              targetType: inline
              pwsh: true
              script: |
                $testProjects = @(
                  Get-ChildItem -Path "$(projectPath)" -Recurse -Filter *Tests.csproj -ErrorAction SilentlyContinue
                  Get-ChildItem -Path "$(projectPath)" -Recurse -Filter *Test.csproj -ErrorAction SilentlyContinue
                ) | Sort-Object FullName -Unique

                if (-not $testProjects) {
                  Write-Host "##vso[task.logissue type=warning]No test projects found. Skipping tests."
                  exit 0
                }

                foreach ($project in $testProjects) {
                  Write-Host "Running tests for $($project.FullName)"
                  dotnet test $project.FullName --configuration $(buildConfiguration) --no-build --logger trx --results-directory "$(Common.TestResultsDirectory)"
                  if ($LASTEXITCODE -ne 0) {
                    exit $LASTEXITCODE
                  }
                }

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: $(Common.TestResultsDirectory)/*.trx
              failTaskOnFailedTests: true
              failTaskOnMissingResultsFile: false
              testRunTitle: API Main Tests

  - stage: Package
    displayName: Build and push API image
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DockerPackage
        displayName: Docker build and optional push
        steps:
          - checkout: self
            fetchDepth: 0

          - task: PowerShell@2
            name: detectDocker
            displayName: Detect Dockerfile and push config
            inputs:
              targetType: inline
              pwsh: true
              script: |
                if (Test-Path "$(dockerfilePath)") {
                  Write-Host "##vso[task.setvariable variable=HasDockerfile]true"
                } else {
                  Write-Host "##vso[task.logissue type=warning]Dockerfile not found at $(dockerfilePath). Skipping Docker build and push."
                  Write-Host "##vso[task.setvariable variable=HasDockerfile]false"
                }

                if ("$(dockerRegistryServiceConnection)" -eq "") {
                  Write-Host "##vso[task.setvariable variable=HasRegistryConnection]false"
                } else {
                  Write-Host "##vso[task.setvariable variable=HasRegistryConnection]true"
                }

                $projects = Get-ChildItem -Path "$(projectPath)" -Recurse -Filter *.csproj -ErrorAction SilentlyContinue
                if ($projects -and ("$(HasDockerfile)" -eq "true")) {
                  Write-Host "##vso[task.setvariable variable=HasDockerBuildContext]true"
                } else {
                  Write-Host "##vso[task.setvariable variable=HasDockerBuildContext]false"
                }

          - task: Docker@2
            displayName: Docker build
            condition: eq(variables['HasDockerBuildContext'], 'true')
            inputs:
              command: build
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: Docker push to ACR
            condition: and(succeeded(), eq(variables['HasDockerBuildContext'], 'true'), eq(variables['HasRegistryConnection'], 'true'))
            inputs:
              command: push
              repository: $(imageRepository)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

          - task: PowerShell@2
            displayName: Warn when ACR push is not configured
            condition: eq(variables['HasRegistryConnection'], 'false')
            inputs:
              targetType: inline
              pwsh: true
              script: |
                Write-Host "##vso[task.logissue type=warning]dockerRegistryServiceConnection is empty. Docker image was built locally but not pushed."